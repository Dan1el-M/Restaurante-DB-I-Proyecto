version: '3.8'

services:
  postgres:
    image: postgres:15.6
    container_name: restaurant-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dbs:/docker-entrypoint-initdb.d
    networks:
      - restaurant-network

  api:
    build: ./backend
    container_name: restaurant-api
    ports:
      - "${API_PORT}:80"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    env_file:
      - .env  # Carga todo el archivo .env
    depends_on:
      - postgres
    networks:
      - restaurant-network

# Volumenes para persistir datos
volumes:
  postgres_data:

# Define el tipo de red que usa la red, en este caso todos se pueden ver entre si
networks:
  restaurant-network:
    driver: bridge 