version: '3.8'

services:
  postgres:
    image: postgres:15.6
    container_name: restaurant-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dbs:/docker-entrypoint-initdb.d
    networks:
      - restaurant-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev --import-realm 
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN_USER}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT}:8080"
      #este es el json que se descarga de keycloak para tener persistencia de los datos
    volumes:
      - ./backend/app/restaurant-realm.json:/opt/keycloak/data/import/restaurant-realm.json
    networks:
      - restaurant-network

  api:
    build: ./backend
    container_name: restaurant-api
    ports:
      - "${API_PORT}:80"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    env_file:
      - .env  # Carga todo el archivo .env
    depends_on:
      - postgres
    networks:
      - restaurant-network

# Volumenes para persistir datos
volumes:
  postgres_data:

# Define el tipo de red que usa la red, en este caso todos se pueden ver entre si
networks:
  restaurant-network:
    driver: bridge 